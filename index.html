                            aria-haspopup="true" aria-expanded="false">Chức năng</a>
                        <div class="dropdown-menu" aria-labelledby="dropdownId">
                            <a class="dropdown-item" href="#">Action 1</a>

    <div class="container">
        <br>
        <div class="row">

            <div class="col-md-8 col-sm-12">
                <h2 class="text-center">Phép tính 2 số</h2>
                <form id="calculationForm">
                    <div class="mb-3">
                        <label for="number1" class="form-label">Số thứ nhất</label>
                        <input type="number" class="form-control" id="number1" required>
                    </div>
                    <div class="mb-3">
                        <label for="operation" class="form-label">Phép tính</label>
                        <select class="form-control" id="operation" required>
                            <option value="add">Cộng</option>
                            <option value="subtract">Trừ</option>
                            <option value="multiply">Nhân</option>
                            <option value="divide">Chia</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="number2" class="form-label">Số thứ hai</label>
                        <input type="number" class="form-control" id="number2" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Tính toán</button>
                </form>
                <div id="result" class="mt-3"></div>
            </div>
            <div class="col-md-4 col-sm-12">
                <h2 class="text-center">Thông tin cá nhân</h2>
                <div class="text-center">
                    <img src="./img/lab10_login_avatar1.png" alt="Avatar" class="rounded-circle" width="150" height="150">
